<svg width="160" height="180" viewBox="0 0 160 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"></stop>
      <stop offset="100%" stop-color="#06b6d4"></stop>
    </linearGradient>
  </defs>

  <!-- Square Background -->
  <rect x="10" y="10" width="140" height="160" rx="24" fill="#0f172a"></rect>

  <!-- Resume Icon (Document) -->
  <rect x="45" y="30" width="70" height="70" rx="10" fill="white"></rect>
  
  <!-- Folded Corner -->
  <polygon points="95,30 115,30 115,50" fill="#e5e7eb"></polygon>

  <!-- Text Lines (resume feel) -->
  <rect x="55" y="55" width="40" height="6" rx="3" fill="#cbd5f5"></rect>
  <rect x="55" y="68" width="50" height="6" rx="3" fill="#cbd5f5"></rect>
  <rect x="55" y="81" width="35" height="6" rx="3" fill="#cbd5f5"></rect>

  <!-- Brand Name -->
  <text x="50%" y="135" text-anchor="middle" font-family="Poppins, Montserrat, sans-serif" font-size="18" font-weight="600">
    <tspan fill="#ffffff">Resume</tspan>
    <tspan x="50%" dy="20" fill="url(#gradText)">Pulse</tspan>
  </text>
</svg>