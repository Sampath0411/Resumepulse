<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066FF"/>
      <stop offset="100%" style="stop-color:#00D4FF"/>
    </linearGradient>
    <linearGradient id="pulseGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D4FF"/>
      <stop offset="100%" style="stop-color:#0066FF"/>
    </linearGradient>
  </defs>

  <!-- Background Square with rounded corners -->
  <rect x="20" y="20" width="160" height="160" rx="32" fill="url(#logoGradient)"/>

  <!-- Document/Resume Icon -->
  <rect x="55" y="45" width="90" height="110" rx="8" fill="white"/>

  <!-- Folded corner -->
  <polygon points="130,45 145,45 145,60" fill="#E0E7FF"/>

  <!-- Text lines on resume -->
  <rect x="70" y="75" width="50" height="8" rx="4" fill="#CBD5E1"/>
  <rect x="70" y="92" width="60" height="8" rx="4" fill="#CBD5E1"/>
  <rect x="70" y="109" width="40" height="8" rx="4" fill="#CBD5E1"/>

  <!-- Checkmark (success/ATS friendly) -->
  <circle cx="125" cy="125" r="20" fill="url(#pulseGradient)"/>
  <path d="M115 125 L122 132 L135 118" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Pulse wave effect at bottom -->
  <path d="M60 145 Q75 135, 90 145 T120 145 T150 145" stroke="rgba(255,255,255,0.3)" stroke-width="3" fill="none" stroke-linecap="round"/>
</svg>
